<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AC Tracker</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css?v=11.0">
</head>
<body>

    <h1>🐛 Animal Crossing Tracker</h1>

    <div id="menu">
        <div id="menuTop">
            <button id="toggleNames">Display Names</button>
            <button id="toggleSound">SFX ON</button>

            <select id="gameSelect">
                <option value="gc">GameCube</option>
                <option value="ww">Wild World</option>
                <option value="cf">City Folk</option>
                <option value="nl">New Leaf</option>
                <option value="nh">New Horizons</option>
            </select>

            <select id="categorySelect">
                <option value="bugs">Bugs</option>
                <option value="fish">Fish</option>
                <option value="all">Bugs & Fish</option>
            </select>
        </div>

        <div id="menuCoop">
            <button id="toggleCoop">Multiplayer</button>
        </div>
    </div>

    <!-- COOP PANEL -->
    <div id="coopMenu">

        <!-- Mode selector -->
        <div id="modeSelector">
            <button id="btnModeCoop" class="mode-btn active">🤝 Co-op</button>
            <button id="btnModeRace">🏁 Race</button>
        </div>

        <!-- Co-op fields -->
        <div id="coopFields">
            <input type="text" id="roomInput" placeholder="Room code">
            <button id="joinRoom">Join</button>
            <button id="createRoom">Create</button>
        </div>

        <!-- Race fields -->
        <div id="raceFields" style="display:none;">
            <input type="text" id="pseudoInput" placeholder="Your nickname">
            <input type="text" id="raceRoomInput" placeholder="Room code">
            <button id="joinRaceRoom">Join</button>
            <button id="createRaceRoom">Create</button>
        </div>

    </div>

    <h2 id="title">City Folk - Bugs</h2>
    <p id="counter">0 / 64</p>

    <!-- RACE SCOREBOARD -->
    <div id="scoreboard"></div>

    <div id="grid"></div>

    <button id="reset">Reset</button>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRAMzzzCiwj_k7xdO_1vP_o2fiyrbt7nM",
            authDomain: "ac-tracker-coop.firebaseapp.com",
            databaseURL: "https://ac-tracker-coop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ac-tracker-coop",
            storageBucket: "ac-tracker-coop.firebasestorage.app",
            messagingSenderId: "417785997476",
            appId: "1:417785997476:web:5a1c80f740d60637f55e31"
        };

        firebase.initializeApp(firebaseConfig);
        window.db = firebase.database();
    </script>

    <script src="script.js?v=11.0"></script>

</body>
</html>
